name: Fund email monitor

on:
  schedule:
    - cron: "0 * * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      report_mode:
        description: "Run mode"
        required: true
        default: "alerts"
        type: choice
        options:
          - alerts
          - status

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FUND_CODES: ${{ vars.FUND_CODES }}
      MONITOR_THRESHOLD: ${{ vars.MONITOR_THRESHOLD }}
      TECH_BENCHMARK_CODE: ${{ vars.TECH_BENCHMARK_CODE }}
      TECH_BENCHMARK_NAME: ${{ vars.TECH_BENCHMARK_NAME }}
      ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
      EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
      EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
      EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
      EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_SMTP_SSL: ${{ secrets.EMAIL_SMTP_SSL }}
      EMAIL_SUBJECT: ${{ vars.EMAIL_SUBJECT }}
      EMAIL_STATUS_SUBJECT: ${{ vars.EMAIL_STATUS_SUBJECT }}
      REPORT_MODE_INPUT: ${{ github.event.inputs.report_mode }}
      SCHEDULE_CRON: ${{ github.event.schedule }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check funds and send email
        shell: bash
        run: |
          set -euo pipefail
          export FUND_CODES="${FUND_CODES:-161725}"
          export MONITOR_THRESHOLD="${MONITOR_THRESHOLD:-3}"
          export TECH_BENCHMARK_CODE="${TECH_BENCHMARK_CODE:-sh000688}"
          export TECH_BENCHMARK_NAME="${TECH_BENCHMARK_NAME:-科创50指数}"
          export EMAIL_SMTP_PORT="${EMAIL_SMTP_PORT:-465}"
          export EMAIL_SMTP_SSL="${EMAIL_SMTP_SSL:-true}"

          MODE="${REPORT_MODE_INPUT:-alerts}"
          # GitHub uses UTC time. 05:00 UTC is 13:00 Beijing time.
          if [ "${GITHUB_EVENT_NAME:-}" = "schedule" ]; then
            if [ "${SCHEDULE_CRON:-}" = "0 5 * * *" ]; then
              MODE="status"
            elif [ "${SCHEDULE_CRON:-}" = "0 * * * *" ] && [ "$(date -u +%H)" = "05" ]; then
              echo "Skipping hourly alert at 13:00 Beijing because the daily status schedule handles this time."
              exit 0
            else
              MODE="alerts"
            fi
          fi
          export REPORT_MODE="$MODE"

          if [ "$MODE" = "status" ]; then
            export EMAIL_SUBJECT="${EMAIL_STATUS_SUBJECT:-每日基金状态}"
          else
            export EMAIL_SUBJECT="${EMAIL_SUBJECT:-基金特殊提醒}"
          fi

          python fund_monitor.py
